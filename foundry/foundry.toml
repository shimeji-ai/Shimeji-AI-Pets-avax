[profile.default]
src = 'src'
out = 'out'
libs = ['lib']
test = 'test'
script = 'script'
solc = '0.8.28'
evm_version = 'cancun'
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = 'read-write', path = './' }]
remappings = [
  '@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/',
  'forge-std/=lib/forge-std/src/'
]

[rpc_endpoints]
local = 'http://127.0.0.1:8545'
fuji = '${FUJI_RPC_URL}'
mainnet = '${MAINNET_RPC_URL}'
